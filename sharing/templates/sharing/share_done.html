{% extends 'sharing/base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="alert alert-success">Share link created and emailed to {{ share.recipient_email }}.</div>
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Share Link</h5>
        <p class="small text-muted">This link will expire at {{ share.expires_at }} (UTC)</p>
        <div class="input-group">
          <input type="text" class="form-control" id="shareLink" value="{{ link }}" readonly>
          <button class="btn btn-outline-secondary" onclick="navigator.clipboard.writeText(document.getElementById('shareLink').value)">Copy</button>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
