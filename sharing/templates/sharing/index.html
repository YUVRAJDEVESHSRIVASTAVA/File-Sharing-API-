{% extends 'sharing/base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-3">Share a file</h3>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="mb-3">
            {{ form.file.label_tag }}
            {{ form.file }}
          </div>
          <div class="mb-3">
            {{ form.sender_email.label_tag }}
            {{ form.sender_email }}
          </div>
          <div class="mb-3">
            {{ form.recipient_email.label_tag }}
            {{ form.recipient_email }}
          </div>
          <button class="btn btn-primary">Upload & Share</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
