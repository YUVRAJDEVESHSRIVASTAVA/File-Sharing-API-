{% extends 'sharing/base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Can't claim this file?</h5>
        <p class="text-muted">You can let the sender know why you can't claim the file.</p>
        <form method="post">
          {% csrf_token %}
          {{ form.reason.label_tag }}
          {{ form.reason }}
          <div class="mt-3">
            <button class="btn btn-danger">Send reason</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
